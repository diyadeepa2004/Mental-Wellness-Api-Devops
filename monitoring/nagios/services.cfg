define host {
    use                     linux-server
    host_name               wellness-api
    alias                   Mental Wellness Server
    address                 127.0.0.1
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                 generic-service
    host_name           wellness-api
    service_description HTTP
    check_command       check_http
}

define service {
    use                 generic-service
    host_name           localhost
    service_description Mental Wellness API Status
    check_command       check_wellness_api
}

define service {
    use                 local-service
    host_name           localhost
    service_description CPU Load
    check_command       check_load
}

define service {
    use                 local-service
    host_name           localhost
    service_description Memory Usage
    check_command       check_local_mem
}
